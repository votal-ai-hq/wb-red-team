# Red-Team AI — AI security gate for CI/CD (GitLab CI)
#
# TEMPLATE — copy the contents into your application's .gitlab-ci.yml (or
# `include:` this file). Define CI/CD variables RED_TEAM_API_KEY (masked) in
# Settings → CI/CD → Variables. Ship examples/cicd/red-team-gate.sh in the repo.

stages:
  - security

ai-security-gate:
  stage: security
  image: alpine:3.20
  variables:
    RED_TEAM_URL: "https://cart.votal.ai"
    CONFIG_FILE: "config-ticketio-smartticketagent.json"
    MIN_SCORE: "80"
    MAX_VULNS: "0"
  before_script:
    - apk add --no-cache bash curl jq
  script:
    - bash examples/cicd/red-team-gate.sh
  artifacts:
    when: always
    paths:
      - red-team-result.json
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
